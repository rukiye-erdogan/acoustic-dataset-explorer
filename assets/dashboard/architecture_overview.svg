<?xml version="1.0" encoding="UTF-8"?>
<svg
    xmlns="http://www.w3.org/2000/svg"
    width="1600"
    height="1100"
    viewBox="0 0 1600 1100"
    role="img"
    aria-labelledby="title description"
>
  <title id="title">Acoustic Dataset Explorer Architecture</title>
  <desc id="description">
    Data engineering and local Docker container workflow.
  </desc>

  <defs>
    <style>
      text {
        font-family: "Inter", "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
        text-rendering: geometricPrecision;
      }

      .title {
        font-size: 50px;
        font-weight: 800;
        fill: #294b38;
      }

      .subtitle {
        font-size: 27px;
        font-weight: 750;
        fill: #294b38;
      }

      .section-title {
        font-size: 21px;
        font-weight: 750;
      }

      .node-title {
        font-size: 21px;
        font-weight: 750;
      }

      .node-body {
        font-size: 15px;
        font-weight: 400;
        fill: #465049;
      }

      .small-title {
        font-size: 18px;
        font-weight: 750;
      }

      .small-body {
        font-size: 14px;
        font-weight: 400;
        fill: #465049;
      }

      .connector-label {
        font-size: 14px;
        font-weight: 450;
        font-style: italic;
        fill: #465049;
      }

      .outline {
        stroke-width: 2;
      }

      .connector {
        fill: none;
        stroke: #8da69a;
        stroke-width: 3;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .connector-green {
        fill: none;
        stroke: #88ae79;
        stroke-width: 3;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .connector-purple {
        fill: none;
        stroke: #ad91de;
        stroke-width: 3;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
    </style>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow
        dx="0"
        dy="5"
        stdDeviation="8"
        flood-color="#8a857a"
        flood-opacity="0.13"
      />
    </filter>

    <marker
        id="arrow-grey"
        markerWidth="12"
        markerHeight="12"
        refX="10"
        refY="6"
        orient="auto"
        markerUnits="strokeWidth"
    >
      <path d="M0,0 L12,6 L0,12 Z" fill="#8da69a"/>
    </marker>

    <marker
        id="arrow-green"
        markerWidth="12"
        markerHeight="12"
        refX="10"
        refY="6"
        orient="auto"
        markerUnits="strokeWidth"
    >
      <path d="M0,0 L12,6 L0,12 Z" fill="#88ae79"/>
    </marker>

    <marker
        id="arrow-purple"
        markerWidth="12"
        markerHeight="12"
        refX="10"
        refY="6"
        orient="auto"
        markerUnits="strokeWidth"
    >
      <path d="M0,0 L12,6 L0,12 Z" fill="#ad91de"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1600" height="1100" fill="#f8f5ec"/>

